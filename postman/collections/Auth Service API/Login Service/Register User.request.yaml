$kind: http-request
description: Register a new user. Password must be 8-128 characters with at
  least one lowercase, one uppercase, one number, and one special character.
url: '{{baseUrl}}:{{loginServicePort}}/api/auth/register'
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: '{"email":"{{email}}","password":"{{password}}"}'
scripts:
  - type: afterResponse
    code: |-
      // ── Data-driven: read expected values from iteration data ─────────────
      const scenario = pm.iterationData.get('scenario') || 'No scenario name';
      const expectedStatus = pm.iterationData.get('expectedStatus');
      const isDataDriven = expectedStatus !== undefined && expectedStatus !== null;

      console.log(`[Register] Scenario: ${scenario}`);
      console.log(`[Register] Expected: ${isDataDriven ? expectedStatus : 201} | Actual: ${pm.response.code}`);

      // ── Status code assertion ─────────────────────────────────────────────
      pm.test(`[${scenario}] Status code is ${isDataDriven ? expectedStatus : 201}`, function () {
          const expected = isDataDriven ? Number(expectedStatus) : 201;
          pm.response.to.have.status(expected);
      });

      // ── Response time (always) ────────────────────────────────────────────
      pm.test('Response time is acceptable (under 1000ms)', function () {
          pm.expect(pm.response.responseTime).to.be.below(1000);
      });

      // ── Content-Type (always) ─────────────────────────────────────────────
      pm.test('Content-Type header is application/json', function () {
          pm.expect(pm.response.headers.get('Content-Type')).to.include('application/json');
      });

      // ── Success path assertions (only when 201 expected) ──────────────────
      const expectedSuccess = isDataDriven ? Number(expectedStatus) === 201 : true;

      if (expectedSuccess) {
          pm.test('Response has success field set to true', function () {
              const jsonData = pm.response.json();
              pm.expect(jsonData).to.have.property('success');
              pm.expect(jsonData.success).to.be.true;
          });

          pm.test('Response has data.user object', function () {
              const jsonData = pm.response.json();
              pm.expect(jsonData).to.have.property('data');
              pm.expect(jsonData.data).to.have.property('user');
              pm.expect(jsonData.data.user).to.be.an('object');
          });

          pm.test('User object has id and email', function () {
              const jsonData = pm.response.json();
              pm.expect(jsonData.data.user).to.have.property('id');
              pm.expect(jsonData.data.user).to.have.property('email');
              pm.expect(jsonData.data.user.email).to.be.a('string');
          });

          pm.test('Response has data.accessToken', function () {
              const jsonData = pm.response.json();
              pm.expect(jsonData.data).to.have.property('accessToken');
              pm.expect(jsonData.data.accessToken).to.be.a('string');
              pm.expect(jsonData.data.accessToken.length).to.be.greaterThan(0);
          });
      }

      // ── Error path assertions (only when non-201 expected) ────────────────
      if (isDataDriven && Number(expectedStatus) !== 201) {
          pm.test('Error response has success: false', function () {
              const jsonData = pm.response.json();
              pm.expect(jsonData).to.have.property('success', false);
          });

          pm.test('Error response has error field', function () {
              const jsonData = pm.response.json();
              pm.expect(jsonData).to.have.property('error');
              pm.expect(jsonData.error).to.be.a('string');
          });
      }

      // ── Save tokens on successful registration ────────────────────────────
      if (pm.response.code === 201) {
          const jsonData = pm.response.json();
          if (jsonData.data && jsonData.data.accessToken) {
              pm.collectionVariables.set('accessToken', jsonData.data.accessToken);
              console.log('Access token saved to collection variables');
          }
          if (jsonData.data && jsonData.data.user && jsonData.data.user.email) {
              pm.collectionVariables.set('userEmail', jsonData.data.user.email);
              console.log('User email saved to collection variables');
          }
      }
    language: text/javascript
  - type: beforeRequest
    code: |-
      // ── Data-driven mode: use email/password from iteration data ─────────
      const iterEmail = pm.iterationData.get('email');
      const iterPassword = pm.iterationData.get('password');

      if (iterEmail !== undefined && iterEmail !== null) {
          // Running with a data file — use iteration values directly
          pm.variables.set('email', iterEmail);
          pm.variables.set('password', iterPassword);
          console.log('[Register] Data-driven mode — email:', iterEmail);
      } else {
          // No data file — generate random valid credentials as before
          const randomString = Math.random().toString(36).substring(2, 10);
          const randomEmail = `user_${randomString}@example.com`;

          function generatePassword() {
              const lowercase = 'abcdefghijklmnopqrstuvwxyz';
              const uppercase = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
              const numbers = '0123456789';
              const special = '!@#$%^&*()_+-=[]{}|;:,.<>?';
              const allChars = lowercase + uppercase + numbers + special;
              let password = '';
              password += lowercase.charAt(Math.floor(Math.random() * lowercase.length));
              password += uppercase.charAt(Math.floor(Math.random() * uppercase.length));
              password += numbers.charAt(Math.floor(Math.random() * numbers.length));
              password += special.charAt(Math.floor(Math.random() * special.length));
              const remainingLength = Math.floor(Math.random() * 9) + 4;
              for (let i = 0; i < remainingLength; i++) {
                  password += allChars.charAt(Math.floor(Math.random() * allChars.length));
              }
              password = password.split('').sort(() => Math.random() - 0.5).join('');
              return password;
          }

          const randomPassword = generatePassword();

          pm.variables.set('email', randomEmail);
          pm.variables.set('password', randomPassword);
          pm.collectionVariables.set('randomEmail', randomEmail);
          pm.collectionVariables.set('randomPassword', randomPassword);
          console.log('[Register] Random mode — email:', randomEmail);
      }
    language: text/javascript
examples: ./.resources/Register User.resources/examples
order: 3000