$kind: http-example
request:
  url: "{{baseUrl}}:{{loginServicePort}}/api/auth/register"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: json
    content: '{"email": "user@example.com", "password": "SecurePass123!", "name":
      "John Doe"}'
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
  body:
    type: json
    content: '{"error": "Internal Server Error", "message": "An unexpected error
      occurred while processing your request", "statusCode": 500, "timestamp":
      "2024-01-15T10:30:00.000Z", "path": "/api/auth/register"}'
order: 5000
